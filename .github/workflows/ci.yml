name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default: read-only. Individual jobs opt in to write permissions
# when they actually need them (only ``docs`` pushes to gh-pages).
permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
      - run: uv run ruff check src/ tests/

  validate-skill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Validate bundled skill frontmatter (agentskills.io core)
        # Uses an inline fallback instead of `skills-ref validate`: the
        # upstream validator rejects Claude Code extension fields
        # (argument-hint, disable-model-invocation) that DEC-004 of
        # plans/super/43-setup-slash-command.md mandates on the bundled
        # SKILL.md. The fallback enforces only the core agentskills.io
        # invariants the spec actually requires.
        run: python scripts/validate_skill_frontmatter.py src/clauditor/skills/clauditor

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --dev
      - name: Run tests under coverage
        # ``pytest --cov`` starts coverage inside pytest's
        # ``pytest_load_initial_conftests`` — AFTER entry-point plugins
        # (``clauditor.pytest_plugin``) have imported their transitive
        # graph. Modules loaded during that early phase have their
        # module-level statements (imports, constants, class/def lines)
        # executed without tracing, producing a ~12pp CI undercount
        # diagnosed in PR #173 (see CI run 25652367478 for the
        # before/after).
        #
        # ``coverage run -m pytest`` flips the order: coverage tracing
        # starts when the ``coverage`` script begins, then it execs
        # ``pytest`` as a module — every subsequent import (including
        # entry-point plugins) runs with coverage active.
        #
        # ``-p no:pytest_cov`` disables the pytest-cov plugin so it
        # doesn't try to start its own (now-redundant) coverage tracer.
        # ``-o "addopts=--import-mode=importlib"`` overrides
        # ``pyproject.toml::addopts`` to drop ``--cov-fail-under=80``
        # (that flag belongs to pytest-cov which is disabled here);
        # the fail-under gate is enforced by the ``coverage report``
        # step below instead.
        run: |
          uv run coverage run -m pytest -p no:pytest_cov -o "addopts=--import-mode=importlib"
          uv run coverage xml
          uv run coverage report --fail-under=80
      - uses: codecov/codecov-action@v5
        if: matrix.python-version == '3.13'
        with:
          files: coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  docs:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    # Only the docs job needs write access (to push ``gh-pages``).
    # Every other job stays read-only via the workflow default above.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --dev
      - run: uv run mkdocs gh-deploy --force --no-history
